<html>
<script type="module">
    import { connect, identify, join, send } from './websocket.js';
    import * as WS from './ws-messages.js';

    let _audioTracks = [];
    let _videoTracks = [];
    let _stream;
    let _connection;
    let _anonymousUserId;
    let _roomId;

    const initializeTracks = async () => {
        try {
            _stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            _audioTracks = _stream.getAudioTracks();
            _videoTracks = _stream.getVideoTracks();

            document.getElementById('local-video').srcObject = _stream;
        } catch (error) {
            console.error('Error accessing media devices.', error);
        }
    }

    const createWebRTCConnection = async (shouldCreateOffer) => {
        console.log('Creating RTCPeerConnection');
        const connectionConfiguration = {
            iceServers: [
                {
                    urls: [
                        'stun:stun.l.google.com:19302',
                        'stun:stun1.l.google.com:19302'
                    ]
                }
            ]
        };

        _connection = new RTCPeerConnection(connectionConfiguration);

        _audioTracks.forEach(track => _connection.addTrack(track, _stream));
        _videoTracks.forEach(track => _connection.addTrack(track, _stream));

        _connection.onicecandidate = event => {
            const logDisabled = false;
            send(WS.ICE_CANDIDATE, { userId: _anonymousUserId, roomId: _roomId, candidate: event.candidate }, logDisabled);
        };

        };

        if (shouldCreateOffer) {
            createAnOffer();
        }
    }

    const createAnOffer = async () => {
        console.log('Creating an offer');
        const offer = await _connection.createOffer();
        await _connection.setLocalDescription(offer);
        send(WS.OFFER_CREATED, { userId: _anonymousUserId, roomId: _roomId, offer: offer });
    }

    const answerOffer = async (offer) => {
        console.log('Answering offer');
        await _connection.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await _connection.createAnswer();
        await _connection.setLocalDescription(answer);
        send(WS.OFFER_ANSWERED, { userId: _anonymousUserId, roomId: _roomId, offerAnswer: answer });
    }

    const offerAnswered = async (offerAnswer) => {
        console.log('Offer answered');
        await _connection.setRemoteDescription(new RTCSessionDescription(offerAnswer));
    }

    const connectToSignalingServer = () => connect((message) => handleMessage(message));

    const handleMessage = (message) => {
        console.log('Received message:', message);
        switch (message.type) {
            case WS.PEERS_READY_TO_START_CONNECTION:
                createWebRTCConnection(message.shouldCreateOffer);
                break;
            case WS.OFFER_CREATED:
                answerOffer(message.offer);
                break;
            case WS.OFFER_ANSWERED:
                offerAnswered(message.offerAnswer);
                break;
            case WS.ICE_CANDIDATE:
                if (message.candidate && _connection) {
                    _connection.addIceCandidate(new RTCIceCandidate(message.candidate));
                }
                break;
            default:
                console.warn('Unknown message type:', message.type);
        }
    }

    const main = async () => {
        await initializeTracks();

        const sessionRes = await fetch('http://localhost:3000/users/anonymous-session', { method: 'POST' });
        const { userId } = await sessionRes.json();
        _anonymousUserId = userId;
        console.log('Session created | User ID:', userId);

        document.getElementById('create-room-btn').addEventListener('click', async () => {
            const res = await fetch(`http://localhost:3000/users/${_anonymousUserId}/rooms/create`, { method: 'POST' });
            const { roomId } = await res.json();
            _roomId = roomId;
            console.log('Room created:', roomId);
            navigator.clipboard.writeText(roomId);
            await connectToSignalingServer();
            identify(_anonymousUserId, roomId);
        });

        document.getElementById('join-btn').addEventListener('click', async () => {
            const roomId = document.getElementById('room-input').value.trim();
            if (!roomId) return;
            _roomId = roomId;
            console.log('Connecting to signaling server');
            await connectToSignalingServer();
            console.log('Joining room:', _roomId);
            join(_roomId, _anonymousUserId);
        });
    }

    main();
</script>

<head>
    <title>User Media - Tracks</title>
</head>

<body>
    <h1>Streams</h1>

    <div>
        <button id="create-room-btn">Create Room</button>

        <br />
        <input id="room-input" type="text" placeholder="Room ID" />
        <button id="join-btn">Join Room</button>
    </div>

    <div>
        <h2>Local Stream</h2>
        <video id="local-video" controls autoplay></video>
    </div>

    <div>
        <h2>Remote Stream</h2>
        <video id="remote-video" controls autoplay></video>
    </div>
</body>

</html>

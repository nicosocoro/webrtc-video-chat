<html>
<script type="module">
    import { connect, identify, join, send } from './websocket.js';

    let audioTracks = [];
    let videoTracks = [];
    let myStream;
    let connection;
    let anonymousUserId;

    const getTracks = async () => {
        try {
            myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            audioTracks = myStream.getAudioTracks();
            videoTracks = myStream.getVideoTracks();

            document.getElementById('local-video').srcObject = myStream;
        } catch (error) {
            console.error('Error accessing media devices.', error);
        }
    }

    const createConnection = () => {
        const connectionConfiguration = {
            iceServers: [
                {
                    urls: [
                        'stun:stun.l.google.com:19302',
                        'stun:stun1.l.google.com:19302',
                        // 'stun:stun2.l.google.com:19302',
                        // 'stun:stun3.l.google.com:19302',
                        // 'stun:stun4.l.google.com:19302',
                    ]
                },
                // {
                //     urls: [
                //         'stun:stun.services.mozilla.com',
                //         'stun:stun.ekiga.net',
                //         'stun:stun.ipfire.org',
                //         'stun:stun.linphone.org',
                //         'stun:stunserver.org'
                //     ]
                // }
            ]
        };
        connection = new RTCPeerConnection(connectionConfiguration);

        audioTracks.forEach(track => connection.addTrack(track, myStream));
        videoTracks.forEach(track => connection.addTrack(track, myStream));


        connection.onicecandidate = event => {
            console.log('New ICE candidate:', event.candidate);
            send({ type: 'ice-candidate', candidate: event.candidate });
        };

        // connection.ontrack = ({ track, streams }) => {
        //     track.onunmute = () => {
        //         const remoteVideo = document.getElementById('remote-video');
        //         if (remoteVideo.srcObject) {
        //             return;
        //         }
        //         remoteVideo.srcObject = streams[0];
        //     };
        // };
    }

    const connectToSignaling = () => connect((message) => console.log('Signaling message:', message));

    const main = async () => {

        const sessionRes = await fetch('http://localhost:3000/users/anonymous-session', { method: 'POST' });
        const { userId } = await sessionRes.json();
        anonymousUserId = userId;
        console.log('Session created | User ID:', userId);

        document.getElementById('create-room-btn').addEventListener('click', async () => {
            const res = await fetch(`http://localhost:3000/users/${anonymousUserId}/rooms/create`, { method: 'POST' });
            const { roomId } = await res.json();
            console.log('Room created:', roomId);
            await connectToSignaling();
            identify(anonymousUserId, roomId);
        });

        document.getElementById('join-btn').addEventListener('click', async () => {
            const roomId = document.getElementById('room-input').value.trim();
            if (!roomId) return;
            console.log('Connecting to signaling server');
            await connectToSignaling();
            console.log('Joining room:', roomId);
            join(roomId, anonymousUserId);
        });

        // await getTracks();
        // createConnection();
    }

    main();
</script>

<head>
    <title>User Media - Tracks</title>
</head>

<body>
    <h1>Streams</h1>

    <div>
        <button id="create-room-btn">Create Room</button>

        <br />
        <input id="room-input" type="text" placeholder="Room ID" />
        <button id="join-btn">Join Room</button>
    </div>

    <div>
        <h2>Local Stream</h2>
        <video id="local-video" controls autoplay></video>
    </div>

    <div>
        <h2>Remote Stream</h2>
        <video id="remote-video" controls autoplay></video>
    </div>
</body>

</html>

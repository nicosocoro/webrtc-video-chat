<html>
<script type="module">
    import { connect, identify, join, disconnect } from './ws/websocket.js';
    import * as WS from './ws/ws-messages.js';
    import { SERVER } from './config.js';
    import { handlePeersReady } from './ws/handlers/peers-ready.js';
    import { handleOfferCreated } from './ws/handlers/offer-created.js';
    import { handleOfferAnswered } from './ws/handlers/offer-answered.js';
    import { handleIceCandidate } from './ws/handlers/ice-candidate.js';

    const state = {
        connection: null,
        stream: null,
        audioTracks: [],
        videoTracks: [],
        userId: null,
        roomId: null,
    };

    const initializeTracks = async () => {
        try {
            state.stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            state.audioTracks = state.stream.getAudioTracks();
            state.videoTracks = state.stream.getVideoTracks();

            document.getElementById('local-video').srcObject = state.stream;
        } catch (error) {
            console.error('Error accessing media devices.', error);
        }
    }

    const resetRemote = (state) => {
        state.connection?.close();
        state.connection = null;
        document.getElementById('remote-video').srcObject = null;
        document.getElementById('streams').classList.remove('peer-connected');
        document.getElementById('leave-btn').style.display = 'none';
    };

    const connectToSignalingServer = () => connect((message) => {
        console.log('Received message:', message);
        const ctx = { message, state };
        switch (message.type) {
            case WS.PEERS_READY_TO_START_CONNECTION: return handlePeersReady(ctx);
            case WS.OFFER_CREATED:                   return handleOfferCreated(ctx);
            case WS.OFFER_ANSWERED:                  return handleOfferAnswered(ctx);
            case WS.ICE_CANDIDATE:                   return handleIceCandidate(ctx);
            case WS.PEER_LEFT:                       return resetRemote(state);
            default: console.warn('Unknown message type:', message.type);
        }
    });

    const main = async () => {
        await initializeTracks();

        const sessionRes = await fetch(`${SERVER}:3000/users/anonymous-session`, { method: 'POST' });
        const { userId } = await sessionRes.json();
        state.userId = userId;
        console.log('Session created | User ID:', userId);

        document.getElementById('create-room-btn').addEventListener('click', async () => {
            const res = await fetch(`${SERVER}:3000/users/${state.userId}/rooms/create`, { method: 'POST' });
            const { roomId } = await res.json();
            state.roomId = roomId;
            console.log('Room created:', roomId);
            navigator.clipboard.writeText(roomId);
            await connectToSignalingServer();
            identify(state.userId, roomId);
        });

        document.getElementById('join-btn').addEventListener('click', async () => {
            const roomId = document.getElementById('room-input').value.trim();
            if (!roomId) return;
            state.roomId = roomId;
            console.log('Connecting to signaling server');
            await connectToSignalingServer();
            console.log('Joining room:', roomId);
            join(roomId, state.userId);
        });

        document.getElementById('leave-btn').addEventListener('click', () => {
            resetRemote(state);
            disconnect();
            state.roomId = null;
        });
    }

    main();
</script>

<head>
    <title>WebRTC</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, sans-serif;
            background: #0f0f0f;
            color: #e8e8e8;
            min-height: 100vh;
            padding: 32px 24px;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        button {
            padding: 8px 18px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #1a1a1a;
            color: #e8e8e8;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        button:hover { background: #252525; border-color: #555; }

        #leave-btn { display: none; border-color: #5a1e1e; color: #e57373; }
        #leave-btn:hover { background: #2a1010; border-color: #e57373; }

        .divider {
            width: 1px;
            height: 28px;
            background: #333;
        }

        input {
            padding: 8px 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #1a1a1a;
            color: #e8e8e8;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus { border-color: #555; }
        input::placeholder { color: #555; }

        .streams {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .stream-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: flex 0.3s ease;
        }

        #local-stream-box { flex: 4; }
        #remote-stream-box { flex: 0; overflow: hidden; display: none; }

        .streams.peer-connected #local-stream-box { flex: 1; }
        .streams.peer-connected #remote-stream-box { flex: 1; display: flex; }

        .stream-box h2 {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #555;
        }

        video {
            width: 100%;
            border-radius: 8px;
            background: #111;
            display: block;
        }
    </style>
</head>

<body>
    <h1>WebRTC</h1>

    <div class="controls">
        <button id="create-room-btn">Create room</button>
        <div class="divider"></div>
        <input id="room-input" type="text" placeholder="Room ID" />
        <button id="join-btn">Join</button>
        <button id="leave-btn">Leave</button>
    </div>

    <div class="streams" id="streams">
        <div class="stream-box" id="local-stream-box">
            <h2>You</h2>
            <video id="local-video" autoplay muted playsinline></video>
        </div>

        <div class="stream-box" id="remote-stream-box">
            <h2>Remote</h2>
            <video id="remote-video" autoplay playsinline></video>
        </div>
    </div>
</body>

</html>
